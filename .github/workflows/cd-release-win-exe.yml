name: CD Release Windows EXE

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

jobs:
  build-and-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve semantic version tag from package.json
        id: semver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$VERSION' is not a valid semantic version (example: 1.2.3)."
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if tag already released
        id: tag_check
        shell: bash
        run: |
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.semver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if version is already released
        if: steps.tag_check.outputs.exists == 'true'
        shell: bash
        run: |
          echo "Tag ${{ steps.semver.outputs.tag }} already exists. Bump package.json version before releasing."
          exit 1

      - name: Create release tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.semver.outputs.tag }}"
          git push origin "${{ steps.semver.outputs.tag }}"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows EXE
        run: npx electron-builder --win nsis --publish never --config.win.signAndEditExecutable=false

      - name: Resolve installer path
        id: resolve_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" |
            Where-Object { $_.Name -like "*Setup*" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Installer EXE not found in release folder."
          }

          "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.tag }}
          name: Release ${{ steps.semver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.resolve_installer.outputs.installer_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
