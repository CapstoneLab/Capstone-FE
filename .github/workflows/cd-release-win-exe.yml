name: CD Release Windows EXE

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Validate semantic version tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' is not a valid semantic version (example: v1.2.3)."
            exit 1
          fi

      - name: Check package.json version matches tag
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows EXE
        run: npx electron-builder --win nsis --publish never --config.win.signAndEditExecutable=false

      - name: Resolve installer path
        id: resolve_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" |
            Where-Object { $_.Name -like "*Setup*" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Installer EXE not found in release folder."
          }

          "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.resolve_installer.outputs.installer_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
